defaults:
  maxTokens: 2048
  requestTimeoutMs: 60000
  healthCheckIntervalMs: 5000
  sampleRate: 16000
  maxRecordingDurationMs: 30000
  minRecordingDurationMs: 500

providers:
  - name: "on-device-gemma4"
    task: "chat"
    protocol: "litert"
    url: "file:///sdcard/atak/custos/models/gemma-4-E2B-it.litertlm"
    model: "gemma-4-E2B-it"
    taskPriority: 1
    tier: "handheld"
    classification: "CUI"
    contextSize: 16384
    threads: 4
    properties:
      backend: "cpu"

  # --- Cloud Chat (API keys stored in Android Keystore, not in this file) ---
