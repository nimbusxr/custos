scriptRuntime:
  maxInstructions: 1000000
  maxConcurrent: 3
  allowPaths:
    - "/sdcard/atak/custos"
  exposeServices:
    - "scheduling"
    - "scriptManager"
    - "vision"
    - "tts"
    - "delegation"
    - "memory"
    - "rag"
  allowPackages:
    # ATAK core
    - "com.atakmap.app"
    - "com.atakmap.android.maps"
    - "com.atakmap.android.cot"
    - "com.atakmap.android.ipc"
    - "com.atakmap.android.dropdown"
    - "com.atakmap.android.util"
    - "com.atakmap.coremap.cot"
    - "com.atakmap.coremap.maps"
    - "com.atakmap.coremap.conversions"
    - "com.atakmap.android.grg"
    - "com.atakmap.android.grgbuilder"
    - "com.atakmap.android.imagecapture"
    - "com.atakmap.android.tilecapture"
    - "com.atakmap.android.gridlines"
    - "com.atakmap.android.drawing"
    - "com.atakmap.android.importexport"
    - "com.atakmap.android.toolbar"
    - "com.atakmap.android.contact"
    - "com.atakmap.android.preference"
    # Routes, navigation, tracking
    - "com.atakmap.android.routes"
    - "com.atakmap.android.bloodhound"
    - "com.atakmap.android.track"
    # Terrain and elevation
    - "com.atakmap.android.elev"
    - "com.atakmap.android.viewshed"
    - "com.atakmap.map.elevation"
    # Geofencing and alerts
    - "com.atakmap.android.geofence"
    - "com.atakmap.android.warning"
    # Communications and chat
    - "com.atakmap.comms"
    - "com.atakmap.android.chat"
    - "com.atakmap.android.channels"
    # Casualty and emergency
    - "com.atakmap.android.medline"
    - "com.atakmap.android.emergency"
    # Fires and munitions
    - "com.atakmap.android.fires"
    - "com.atakmap.android.munitions"
    # Data exchange and mission packages
    - "com.atakmap.android.importfiles"
    - "com.atakmap.android.gpx"
    - "com.atakmap.android.missionpackage"
    # Video and imagery
    - "com.atakmap.android.video"
    - "com.atakmap.android.image"
    # Layers and overlays
    - "com.atakmap.android.layers"
    - "com.atakmap.android.contentservices"
    - "com.atakmap.android.overlay"
    # Vehicles, models, and symbology
    - "com.atakmap.android.vehicle"
    - "com.atakmap.android.model"
    - "com.atakmap.android.drawing.milsym"
    - "com.atakmap.android.icons"
    - "com.atakmap.android.user.icon"
    # Organization and tagging
    - "com.atakmap.android.hashtags"
    - "com.atakmap.android.attachment"
    # Measurement tools
    - "com.atakmap.android.toolbars"
    # Specialized tactical
    - "com.atakmap.android.bpha"
    - "com.atakmap.android.resection"
    - "com.atakmap.android.location"
    - "com.atakmap.android.user.geocode"
    # Rendering controls
    - "com.atakmap.map.layer.control"
    # Symbology
    - "gov.tak.platform.symbology"
    - "armyc2.c5isr.renderer"
    # CUSTOS internals (for import() access — services are injected separately)
    - "com.nimbusxr.custos.plugin.inference"
  denyMethods:
    - "java.lang.System.exit"
    - "java.lang.Runtime.exec"
    - "java.lang.Runtime.halt"
    - "java.lang.ProcessBuilder"
    - "java.io.File.delete"
    - "java.io.File.deleteOnExit"
    - "java.lang.ClassLoader"
    - "java.lang.reflect.Proxy"
    - "java.net.Socket"
    - "java.net.ServerSocket"
    - "java.net.URL.openConnection"
    - "java.net.HttpURLConnection"

security:
  defaultOperatorTier: "ADMIN"
  mode: normal
  classificationLevel: "UNCLASSIFIED"

